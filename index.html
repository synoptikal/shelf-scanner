<!DOCTYPE html>
<!-- ============================================================
     SHELF SCANNER — phone-camera client
     Host this single file on GitHub Pages (public repo is fine:
     it contains NO secrets — the endpoint URL and token are
     entered once per phone and kept in localStorage).

     Backend: the Shelf Scanner.gs web app (deployed with access
     "Anyone", execute as Andrew). All writes happen server-side
     under the shared Book List lock; this page only scans,
     displays, and confirms.

     Camera scanning: html5-qrcode (ZXing) via CDN, EAN-13 only.
     The manual-entry box doubles as a wedge-scanner target, so a
     hardware scanner remains compatible forever.
     ============================================================ -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#1a73e8">
<title>Shelf Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  body{font-family:Arial,Helvetica,sans-serif;font-size:15px;margin:0;background:#f6f7f9;color:#222}
  header{background:#1a73e8;color:#fff;padding:12px 14px;font-size:17px;font-weight:bold;display:flex;justify-content:space-between;align-items:center}
  header button{background:transparent;border:1px solid rgba(255,255,255,.6);color:#fff;border-radius:6px;padding:4px 10px;font-size:13px}
  main{padding:12px;max-width:560px;margin:0 auto}
  #reader{width:100%;border-radius:10px;overflow:hidden;background:#000;min-height:120px}
  .row{display:flex;gap:8px;margin:10px 0}
  input[type=text],input[type=password]{flex:1;box-sizing:border-box;font-size:16px;padding:10px;border:1px solid #bbb;border-radius:8px}
  .btn{padding:10px 14px;font-size:15px;border:0;border-radius:8px;background:#1a73e8;color:#fff;cursor:pointer}
  .btn.green{background:#1a7f37}.btn.amber{background:#9a6700}.btn.ghost{background:#e8eaed;color:#333}
  .btn.big{width:100%;padding:12px;font-size:16px;margin-top:8px}
  .card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:12px;margin:10px 0;box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .card h3{margin:0 0 4px;font-size:15px}
  .meta{color:#555;font-size:13px;margin-bottom:8px}
  .src{color:#999;font-size:12px}
  .ok{color:#1a7f37}.warn{color:#b26a00}.err{color:#c5221f}
  .sellerbtn{display:inline-block;margin:4px 6px 2px 0;padding:9px 12px;font-size:14px;border:0;border-radius:8px;background:#1a7f37;color:#fff}
  .sellerbtn.w{background:#9a6700}
  .hintline{color:#666;font-size:12px;margin:6px 2px}
  #log .item{font-size:13px;padding:6px 2px;border-bottom:1px solid #eee}
  footer{color:#999;font-size:12px;text-align:center;padding:14px}
  .hidden{display:none}
</style>
</head>
<body>
<header>
  <span>Shelf Scanner</span>
  <button onclick="showSetup()">Settings</button>
</header>
<main>

  <!-- Setup (first run / settings) -->
  <div id="setup" class="card hidden">
    <h3>Connect to the Book List</h3>
    <div class="meta">Paste the Apps Script web-app URL (ends in <code>/exec</code>) and the shared token. Stored only on this phone.</div>
    <div class="row"><input type="text" id="cfg_url" placeholder="https://script.google.com/macros/s/.../exec"></div>
    <div class="row"><input type="password" id="cfg_token" placeholder="Shared token"></div>
    <button class="btn big" onclick="saveSetup()">Save &amp; start</button>
  </div>

  <!-- Scanner -->
  <div id="app" class="hidden">
    <div id="reader"></div>
    <div class="hintline">Point at the barcode on the back cover. EAN-13 only — that is every ISBN.</div>
    <div class="row">
      <input type="text" id="manual" inputmode="numeric" placeholder="\u2026or type / wedge-scan an ISBN">
      <button class="btn" onclick="manualGo()">Go</button>
    </div>
    <div id="out"></div>
    <div class="row hidden" id="searchrow">
      <input type="text" id="search" placeholder="Type part of the title to find it manually\u2026">
      <button class="btn" onclick="searchGo()">Find</button>
    </div>
    <button class="btn big hidden" id="next" onclick="resumeScan()">Scan next book</button>
    <div id="log"></div>
  </div>

</main>
<footer>Add to Home screen for one-tap access \u00b7 writes go through the Book List lock</footer>

<script>
var CFG = { url: localStorage.getItem('shelf_endpoint') || '', token: localStorage.getItem('shelf_token') || '' };
var scanner = null;
var scanning = false;
var currentIsbn = null;

function $(id) { return document.getElementById(id); }
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// ---------- setup ----------
function showSetup() {
  stopScan();
  $('cfg_url').value = CFG.url;
  $('cfg_token').value = CFG.token;
  $('setup').classList.remove('hidden');
  $('app').classList.add('hidden');
}
function saveSetup() {
  CFG.url = $('cfg_url').value.trim();
  CFG.token = $('cfg_token').value.trim();
  localStorage.setItem('shelf_endpoint', CFG.url);
  localStorage.setItem('shelf_token', CFG.token);
  boot();
}
function boot() {
  if (!CFG.url || !CFG.token) { showSetup(); return; }
  $('setup').classList.add('hidden');
  $('app').classList.remove('hidden');
  startScan();
}

// ---------- camera ----------
function startScan() {
  if (scanning) return;
  if (!scanner) scanner = new Html5Qrcode('reader');
  var config = {
    fps: 10,
    qrbox: { width: 280, height: 130 },
    formatsToSupport: [Html5QrcodeSupportedFormats.EAN_13]
  };
  scanner.start({ facingMode: 'environment' }, config, onDecode, function () { /* per-frame miss — ignore */ })
    .then(function () { scanning = true; })
    .catch(function (err) {
      $('out').innerHTML = '<div class="card"><span class="err">Camera unavailable: ' + esc(err) +
        '</span><div class="meta">Grant camera permission, or use the manual box above.</div></div>';
    });
}
function stopScan() {
  if (scanner && scanning) { scanner.stop().catch(function () {}); scanning = false; }
}
function resumeScan() {
  $('out').innerHTML = '';
  $('next').classList.add('hidden');
  $('searchrow').classList.add('hidden');
  startScan();
}
function onDecode(text) {
  stopScan();
  if (navigator.vibrate) navigator.vibrate(80);
  handleScan(text);
}
function manualGo() {
  var v = $('manual').value.trim();
  $('manual').value = '';
  if (!v) return;
  stopScan();
  handleScan(v);
}

// ---------- API ----------
function api(action, payload) {
  // text/plain body = CORS simple request; no preflight; Apps Script pattern.
  return fetch(CFG.url, { method: 'POST', body: JSON.stringify({ token: CFG.token, action: action, payload: payload }) })
    .then(function (r) { return r.json(); })
    .then(function (j) {
      if (!j.ok) {
        if (j.error === 'unauthorized') { showSetup(); throw new Error('Token rejected — check Settings.'); }
        throw new Error(j.error || 'server error');
      }
      return j.data;
    });
}
function busy(msg) { $('out').innerHTML = '<div class="card">' + esc(msg) + '</div>'; }
function fail(e) {
  $('out').innerHTML = '<div class="card"><span class="err">Error: ' + esc(e.message || e) + '</span></div>';
  $('next').classList.remove('hidden');
}
function addLog(html) {
  var d = document.createElement('div');
  d.className = 'item';
  d.innerHTML = html;
  $('log').insertBefore(d, $('log').firstChild);
}

// ---------- flow ----------
function handleScan(v) {
  currentIsbn = null;
  busy('Looking up ' + v + '\u2026');
  api('scan', { isbn: v }).then(renderVerdict).catch(fail);
}
function sellerButtons(c) {
  var h = '';
  for (var i = 0; i < c.sellers.length; i++) {
    var s = c.sellers[i];
    h += '<button class="sellerbtn ' + (s.status === 'W' ? 'w' : '') + '" ' +
      'onclick=\'pick(' + c.row + ',' + s.col + ',' + JSON.stringify(c).replace(/'/g, '&#39;') + ',' + JSON.stringify(s.seller).replace(/'/g, '&#39;') + ')\'>' +
      esc(s.seller) + ' (' + s.status + ') \u2192 Arrived</button>';
  }
  h += '<button class="sellerbtn ghost" style="background:#e8eaed;color:#333" ' +
    'onclick=\'pickRegisterOnly(' + JSON.stringify(c).replace(/'/g, '&#39;') + ')\'>Shelve only</button>';
  return h;
}
function candCard(c) {
  return '<div class="card"><h3>' + esc(c.title) + '</h3><div class="meta">' +
    esc(c.series && c.series !== '-' ? c.series + ' #' + c.num : 'Standalone') + ' \u2014 ' + esc(c.author) +
    '</div>' + sellerButtons(c) + '</div>';
}
function renderVerdict(v) {
  $('next').classList.remove('hidden');
  if (v.kind === 'invalid') {
    $('out').innerHTML = '<div class="card"><span class="warn">' + esc(v.msg) + '</span></div>';
    return;
  }
  currentIsbn = v.isbn13;
  if (v.kind === 'registered') {
    var h = '<div class="card"><h3>' + esc(v.book.title) + '</h3><div class="meta">' +
      esc(v.book.series && v.book.series !== '-' ? v.book.series + ' #' + v.book.num : 'Standalone') +
      ' \u2014 ' + esc(v.book.author) + '<br>Registered: ' + esc(v.book.bookshop || '(no shop recorded)') + '</div>';
    if (v.live) {
      h += '<div class="meta"><span class="warn">Sheet still says ' + v.live.status + ' at ' + esc(v.live.seller) +
        '.</span></div><button class="sellerbtn" onclick=\'pickLive(' + v.live.row + ',' + v.live.col + ',' +
        JSON.stringify(v.book.title).replace(/'/g, '&#39;') + ')\'>Mark Arrived now</button>';
    } else {
      h += '<div class="meta"><span class="ok">\u2713 Already on the shelf \u2014 nothing to do.</span></div>';
    }
    h += '</div>';
    $('out').innerHTML = h;
    return;
  }
  var h = '';
  if (v.hint) {
    h += '<div class="card"><div class="meta">Lookup hint: <strong>' + esc(v.hint.title) + '</strong>' +
      (v.hint.author ? ' \u2014 ' + esc(v.hint.author) : '') + ' <span class="src">(' + esc(v.hint.source) + ')</span></div></div>';
  } else {
    h += '<div class="card"><div class="meta">No public data for this barcode \u2014 normal for subscription-box exclusives. Find it below.</div></div>';
  }
  for (var i = 0; i < v.candidates.length; i++) h += candCard(v.candidates[i]);
  $('out').innerHTML = h;
  $('searchrow').classList.remove('hidden');
}
function searchGo() {
  var q = $('search').value.trim();
  if (!q) return;
  busy('Searching \u201c' + q + '\u201d\u2026');
  api('search', { query: q }).then(function (list) {
    var h = list.length ? '' : '<div class="card"><span class="warn">No Book List match for \u201c' + esc(q) + '\u201d.</span></div>';
    for (var i = 0; i < list.length; i++) h += candCard(list[i]);
    $('out').innerHTML = h;
    $('next').classList.remove('hidden');
  }).catch(fail);
}
function send(p) {
  busy('Writing\u2026');
  api('confirm', p).then(function (res) {
    $('out').innerHTML = '<div class="card"><span class="' + (res.ok ? 'ok' : 'err') + '">' + res.msg + '</span></div>';
    addLog(res.msg);
    $('next').classList.remove('hidden');
    $('searchrow').classList.add('hidden');
  }).catch(fail);
}
function pick(row, col, c, seller) {
  send({ isbn13: currentIsbn, row: row, col: col, seller: seller, series: c.series, num: c.num, title: c.title, author: c.author, registerOnly: false });
}
function pickLive(row, col, title) {
  send({ isbn13: currentIsbn, row: row, col: col, title: title, registerOnly: false });
}
function pickRegisterOnly(c) {
  send({ isbn13: currentIsbn, row: null, col: null, seller: null, series: c.series, num: c.num, title: c.title, author: c.author, registerOnly: true });
}

boot();
</script>
</body>
</html>
