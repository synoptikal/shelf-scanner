<!DOCTYPE html>
<!-- ============================================================
     SHELF SCANNER — phone-camera client
     Host this single file on GitHub Pages (public repo is fine:
     it contains NO secrets — the endpoint URL and token are
     entered once per phone and kept in localStorage).

     Backend: the Shelf Scanner.gs web app (deployed with access
     "Anyone", execute as Andrew). All writes happen server-side
     under the shared Book List lock; this page only scans,
     displays, and confirms.

     Camera scanning: html5-qrcode (ZXing) via CDN, EAN-13 only.
     The manual-entry box doubles as a wedge-scanner target, so a
     hardware scanner remains compatible forever.
     ============================================================ -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#1b3a2a">
<title>Shelf Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --green-900:#1b3a2a; --green-700:#2d5a40; --green-600:#39704f; --green-100:#e7efe9;
    --plum-900:#2e2044;  --plum-700:#4a3268;  --plum-600:#5d4383;  --plum-100:#ece7f3;
    --amber-700:#6e5410; --amber-100:#f4ecd8;
    --paper:#f6f4ee; --card:#fffdf8; --line:#e3e0d6;
    --ink:#26281f; --muted:#6f7268; --err:#a63d3d;
  }
  *{-webkit-tap-highlight-color:transparent}
  body{font-family:Arial,Helvetica,sans-serif;font-size:15px;margin:0;background:var(--paper);color:var(--ink)}
  header{background:linear-gradient(120deg,var(--green-900) 0%,var(--green-900) 35%,var(--plum-900) 100%);color:#fff;
    padding:14px 16px;display:flex;justify-content:space-between;align-items:center;
    border-bottom:3px solid var(--plum-600)}
  header span{font-family:Georgia,'Times New Roman',serif;font-size:19px;font-weight:bold;letter-spacing:.3px}
  header button{background:transparent;border:1px solid rgba(255,255,255,.55);color:#fff;
    border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;transition:background .12s}
  header button:active{background:rgba(255,255,255,.15)}
  main{padding:14px;max-width:560px;margin:0 auto}
  #reader{width:100%;border-radius:12px;overflow:hidden;background:#0d130f;min-height:120px;
    border:2px solid var(--green-700);box-shadow:0 2px 10px rgba(27,58,42,.18)}
  .row{display:flex;gap:8px;margin:12px 0}
  input[type=text],input[type=password],.mkselect{flex:1;box-sizing:border-box;font-size:16px;
    padding:11px;border:1.5px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink)}
  input:focus,.mkselect:focus{outline:2px solid var(--plum-600);outline-offset:1px;border-color:var(--plum-600)}
  .btn{padding:11px 15px;font-size:15px;border:0;border-radius:10px;background:var(--plum-700);
    color:#fff;cursor:pointer;transition:transform .08s,background .12s}
  .btn:active{transform:scale(.97);background:var(--plum-900)}
  .btn.big{width:100%;padding:13px;font-size:16px;margin-top:8px;background:var(--plum-700)}
  .btn.big:active{background:var(--plum-900)}
  .card{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--green-700);
    border-radius:12px;padding:13px;margin:10px 0;box-shadow:0 1px 4px rgba(38,40,31,.06)}
  .card h3{margin:0 0 4px;font-size:16px;font-family:Georgia,'Times New Roman',serif;color:var(--plum-900)}
  .meta{color:var(--muted);font-size:13px;margin-bottom:8px;line-height:1.5}
  .src{color:#9a9d92;font-size:12px}
  .ok{color:var(--green-700);font-weight:bold}
  .warn{color:var(--amber-700)}
  .err{color:var(--err)}
  .sellerbtn{display:inline-block;margin:4px 6px 2px 0;padding:10px 13px;font-size:14px;border:0;
    border-radius:10px;background:var(--green-700);color:#fff;cursor:pointer;transition:transform .08s}
  .sellerbtn:active{transform:scale(.97)}
  .sellerbtn.w{background:var(--amber-700)}
  .sellerbtn.ghost{background:var(--plum-100);color:var(--plum-700);border:1.5px solid var(--plum-600)}
  .ownedchip{display:inline-block;background:var(--plum-100);color:var(--plum-700);
    border-radius:999px;padding:2px 9px;font-size:12px;margin-top:2px}
  .hintline{color:var(--muted);font-size:12px;margin:7px 2px}
  #log{margin-top:18px}
  #log .item{font-size:13px;padding:7px 4px 7px 10px;border-bottom:1px solid var(--line);
    border-left:3px solid var(--plum-600)}
  footer{color:var(--plum-600);opacity:.65;font-size:12px;text-align:center;padding:16px}
  .hidden{display:none}
</style>
</head>
<body>
<header>
  <span>Shelf Scanner</span>
  <button onclick="showSetup()">Settings</button>
</header>
<main>

  <!-- Setup (first run / settings) -->
  <div id="setup" class="card hidden">
    <h3>Connect to the Book List</h3>
    <div class="meta">Paste the Apps Script web-app URL (ends in <code>/exec</code>) and the shared token. Stored only on this phone.</div>
    <div class="row"><input type="text" id="cfg_url" placeholder="https://script.google.com/macros/s/.../exec"></div>
    <div class="row"><input type="password" id="cfg_token" placeholder="Shared token"></div>
    <button class="btn big" onclick="saveSetup()">Save &amp; start</button>
  </div>

  <!-- Scanner -->
  <div id="app" class="hidden">
    <div id="reader"></div>
    <div class="hintline">Point at the barcode on the back cover. EAN-13 only — that is every ISBN.</div>
    <div class="row">
      <input type="text" id="manual" inputmode="numeric" placeholder="Input available ISBN if no barcode exists">
      <button class="btn" onclick="manualGo()">Go</button>
    </div>
    <div id="out"></div>
    <div class="row hidden" id="searchrow">
      <input type="text" id="search" placeholder="Type part of the title to find it manually…">
      <button class="btn" onclick="searchGo()">Find</button>
    </div>
    <button class="btn big hidden" id="next" onclick="resumeScan()">Scan next book</button>
    <div id="log"></div>
  </div>

</main>
<footer>Add to Home screen for one-tap access · writes go through the Book List lock</footer>

<script>
var CFG = { url: localStorage.getItem('shelf_endpoint') || '', token: localStorage.getItem('shelf_token') || '' };
var scanner = null;
var scanning = false;
var currentIsbn = null;
var allSellers = [];

function $(id) { return document.getElementById(id); }
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// ---------- setup ----------
function showSetup() {
  stopScan();
  $('cfg_url').value = CFG.url;
  $('cfg_token').value = CFG.token;
  $('setup').classList.remove('hidden');
  $('app').classList.add('hidden');
}
function saveSetup() {
  CFG.url = $('cfg_url').value.trim();
  CFG.token = $('cfg_token').value.trim();
  localStorage.setItem('shelf_endpoint', CFG.url);
  localStorage.setItem('shelf_token', CFG.token);
  boot();
}
function boot() {
  if (!CFG.url || !CFG.token) { showSetup(); return; }
  $('setup').classList.add('hidden');
  $('app').classList.remove('hidden');
  startScan();
}

// ---------- camera ----------
function startScan() {
  if (scanning) return;
  if (!scanner) scanner = new Html5Qrcode('reader');
  var config = {
    fps: 10,
    qrbox: { width: 280, height: 130 },
    formatsToSupport: [Html5QrcodeSupportedFormats.EAN_13]
  };
  scanner.start({ facingMode: 'environment' }, config, onDecode, function () { /* per-frame miss — ignore */ })
    .then(function () { scanning = true; })
    .catch(function (err) {
      $('out').innerHTML = '<div class="card"><span class="err">Camera unavailable: ' + esc(err) +
        '</span><div class="meta">Grant camera permission, or use the manual box above.</div></div>';
    });
}
function stopScan() {
  if (scanner && scanning) { scanner.stop().catch(function () {}); scanning = false; }
}
function resumeScan() {
  $('out').innerHTML = '';
  $('next').classList.add('hidden');
  $('searchrow').classList.add('hidden');
  startScan();
}
function onDecode(text) {
  stopScan();
  if (navigator.vibrate) navigator.vibrate(80);
  handleScan(text);
}
function manualGo() {
  var v = $('manual').value.trim();
  $('manual').value = '';
  if (!v) return;
  stopScan();
  handleScan(v);
}

// ---------- API ----------
function api(action, payload) {
  // text/plain body = CORS simple request; no preflight; Apps Script pattern.
  return fetch(CFG.url, { method: 'POST', body: JSON.stringify({ token: CFG.token, action: action, payload: payload }) })
    .then(function (r) { return r.json(); })
    .then(function (j) {
      if (!j.ok) {
        if (j.error === 'unauthorized') { showSetup(); throw new Error('Token rejected — check Settings.'); }
        throw new Error(j.error || 'server error');
      }
      return j.data;
    });
}
function busy(msg) { $('out').innerHTML = '<div class="card">' + esc(msg) + '</div>'; }
function fail(e) {
  $('out').innerHTML = '<div class="card"><span class="err">Error: ' + esc(e.message || e) + '</span></div>';
  $('next').classList.remove('hidden');
}
function addLog(html) {
  var d = document.createElement('div');
  d.className = 'item';
  d.innerHTML = html;
  $('log').insertBefore(d, $('log').firstChild);
}

// ---------- flow ----------
function handleScan(v) {
  currentIsbn = null;
  busy('Looking up ' + v + '…');
  api('scan', { isbn: v }).then(renderVerdict).catch(fail);
}
function sellerButtons(c) {
  var h = '';
  var cJson = JSON.stringify(c).replace(/'/g, '&#39;');
  for (var i = 0; i < c.sellers.length; i++) {
    var s = c.sellers[i];
    h += '<button class="sellerbtn ' + (s.status === 'W' ? 'w' : '') + '" ' +
      'onclick=\'pick(' + c.row + ',' + s.col + ',' + cJson + ',' + JSON.stringify(s.seller).replace(/'/g, '&#39;') + ')\'>' +
      esc(s.seller) + ' (' + s.status + ') → Arrived</button>';
  }
  var owned = c.owned || [];
  if (owned.length) {
    // Committee rule 2026-07-11: registry-only is offered ONLY when the
    // Book List already says O somewhere.
    h += '<button class="sellerbtn ghost" ' +
      'onclick=\'pickRegisterOnly(' + cJson + ')\'>Shelve only</button>';
  } else if (!c.sellers.length) {
    // Nothing marked at all: probably a forgotten mark. Offer the fix.
    var opts = '';
    for (var k = 0; k < allSellers.length; k++) {
      opts += '<option value="' + allSellers[k].col + '">' + esc(allSellers[k].seller) + '</option>';
    }
    h += '<div class="meta"><span class="warn">⚠ Not marked W/P/O on the Book List — forgot to mark it?</span></div>' +
      '<div class="row"><select id="mkseller_' + c.row + '" class="mkselect">' + opts + '</select>' +
      '<button class="sellerbtn" onclick=\'pickMarkOwned(' + cJson + ')\'>Mark Owned &amp; shelve</button></div>';
  }
  return h;
}
function candCard(c) {
  var ownedLine = (c.owned && c.owned.length)
    ? '<br><span class="ownedchip">Owned at: ' + c.owned.map(function (o) { return esc(o.seller); }).join(', ') + '</span>'
    : '';
  return '<div class="card"><h3>' + esc(c.title) + '</h3><div class="meta">' +
    esc(c.series && c.series !== '-' ? c.series + ' #' + c.num : 'Standalone') + ' — ' + esc(c.author) +
    ownedLine + '</div>' + sellerButtons(c) + '</div>';
}
function renderVerdict(v) {
  if (v.allSellers) allSellers = v.allSellers;
  $('next').classList.remove('hidden');
  if (v.kind === 'invalid') {
    $('out').innerHTML = '<div class="card"><span class="warn">' + esc(v.msg) + '</span></div>';
    return;
  }
  currentIsbn = v.isbn13;
  if (v.kind === 'registered') {
    var h = '<div class="card"><h3>' + esc(v.book.title) + '</h3><div class="meta">' +
      esc(v.book.series && v.book.series !== '-' ? v.book.series + ' #' + v.book.num : 'Standalone') +
      ' — ' + esc(v.book.author) + '<br>Registered: ' + esc(v.book.bookshop || '(no shop recorded)') + '</div>';
    if (v.live) {
      h += '<div class="meta"><span class="warn">Sheet still says ' + v.live.status + ' at ' + esc(v.live.seller) +
        '.</span></div><button class="sellerbtn" onclick=\'pickLive(' + v.live.row + ',' + v.live.col + ',' +
        JSON.stringify(v.book.title).replace(/'/g, '&#39;') + ')\'>Mark Arrived now</button>';
    } else {
      h += '<div class="meta"><span class="ok">✓ Already on the shelf — nothing to do.</span></div>';
    }
    h += '</div>';
    $('out').innerHTML = h;
    return;
  }
  var h = '';
  if (v.hint) {
    h += '<div class="card"><div class="meta">Lookup hint: <strong>' + esc(v.hint.title) + '</strong>' +
      (v.hint.author ? ' — ' + esc(v.hint.author) : '') + ' <span class="src">(' + esc(v.hint.source) + ')</span></div></div>';
    for (var i = 0; i < v.candidates.length; i++) h += candCard(v.candidates[i]);
  } else {
    h += '<div class="card"><div class="meta">No lookup data for this barcode — normal for subscription-box exclusives. ' +
      'Type part of the title below to teach it once.</div></div>';
    if (v.candidates.length) {
      h += '<div class="hintline">Currently awaiting arrival — tap if it’s one of these:</div>';
      for (var j = 0; j < v.candidates.length; j++) h += candCard(v.candidates[j]);
    }
  }
  $('out').innerHTML = h;
  $('searchrow').classList.remove('hidden');
  if (!v.hint) { setTimeout(function () { $('search').focus(); }, 50); }
}
function searchGo() {
  var q = $('search').value.trim();
  if (!q) return;
  busy('Searching “' + q + '”…');
  api('search', { query: q }).then(function (res) {
    if (res.allSellers) allSellers = res.allSellers;
    var list = res.books || [];
    var h = list.length ? '' : '<div class="card"><span class="warn">No Book List match for “' + esc(q) + '”.</span></div>';
    for (var i = 0; i < list.length; i++) h += candCard(list[i]);
    $('out').innerHTML = h;
    $('next').classList.remove('hidden');
  }).catch(fail);
}
function send(p) {
  busy('Writing…');
  api('confirm', p).then(function (res) {
    $('out').innerHTML = '<div class="card"><span class="' + (res.ok ? 'ok' : 'err') + '">' + res.msg + '</span></div>';
    addLog(res.msg);
    $('next').classList.remove('hidden');
    $('searchrow').classList.add('hidden');
  }).catch(fail);
}
function pick(row, col, c, seller) {
  send({ isbn13: currentIsbn, row: row, col: col, seller: seller, series: c.series, num: c.num, title: c.title, author: c.author, registerOnly: false });
}
function pickLive(row, col, title) {
  send({ isbn13: currentIsbn, row: row, col: col, title: title, registerOnly: false });
}
function pickRegisterOnly(c) {
  send({ isbn13: currentIsbn, row: null, col: null, seller: null, series: c.series, num: c.num, title: c.title, author: c.author, registerOnly: true });
}
function pickMarkOwned(c) {
  var sel = document.getElementById('mkseller_' + c.row);
  if (!sel) return;
  var col = Number(sel.value);
  var seller = sel.options[sel.selectedIndex].text;
  send({ isbn13: currentIsbn, row: c.row, col: col, seller: seller, series: c.series, num: c.num, title: c.title, author: c.author, registerOnly: false, markOwned: true });
}

boot();
</script>
</body>
</html>
